name: Deploy to GitHub Pages

# ─────────────────────────────────────────────────────────────────────────────
# Security notes:
#  - All Actions pinned to full commit SHA (supply-chain safety)
#  - Least-privilege: pages:write + id-token:write ONLY
#  - No automatic push trigger on all commits — only on relevant file changes
#  - concurrency group prevents simultaneous deploys
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'builder.css'
      - 'builder.js'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

permissions:
  contents:        read
  pages:           write
  id-token:        write
  actions:         none
  checks:          none
  deployments:     none
  issues:          none
  packages:        none
  pull-requests:   none
  repository-projects: none
  security-events: none
  statuses:        none

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        # Pinned SHA — verify at https://github.com/actions/checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup GitHub Pages
        # Pinned SHA — verify at https://github.com/actions/configure-pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0

      - name: Upload pages artifact
        # Pinned SHA — verify at https://github.com/actions/upload-pages-artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        # Pinned SHA — verify at https://github.com/actions/deploy-pages
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
